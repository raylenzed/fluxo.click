version: "3.9"

# ============================================================
# Fluxo — Docker Compose
# ============================================================
# Usage:
#   docker compose up -d
#
# Prerequisites on the host:
#   • Mihomo is running on the host (external-controller: 0.0.0.0:9090)
#   • /etc/mihomo/config.yaml exists
#
# Ports exposed:
#   8080  Web UI  (Next.js)
#   8090  API     (Fastify)
# ============================================================

services:
  fluxo:
    image: fluxo:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluxo
    restart: unless-stopped

    ports:
      - "${WEB_PORT:-8080}:8080"    # Web UI  (Next.js)
      - "${SERVER_PORT:-8090}:8090" # API Server (Fastify)

    volumes:
      - /etc/mihomo:/etc/mihomo          # Mihomo config (read-write so Fluxo can apply config)
      - fluxo_data:/data                 # Persistent SQLite DB + uploads

    environment:
      - NODE_ENV=production
      - DB_PATH=/data/fluxo.db
      - CONFIG_PATH=/etc/mihomo/config.yaml
      - WEB_PORT=8080
      - SERVER_PORT=8090
      # Point to Mihomo running on the host (or another container)
      - MIHOMO_API_URL=${MIHOMO_API_URL:-http://host-gateway:9090}
      - MIHOMO_SECRET=${MIHOMO_SECRET:-}

    # Lets the container reach the host via "host-gateway"
    extra_hosts:
      - "host-gateway:host-gateway"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  fluxo_data:
    driver: local
